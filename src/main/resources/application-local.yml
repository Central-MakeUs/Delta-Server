spring:
  config:
    activate:
      on-profile: local

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${LOCAL_DB_URL}
    username: ${LOCAL_DB_USERNAME}
    password: ${LOCAL_DB_PASSWORD}

  data:
    redis:
      host: localhost

management:
  metrics:
    tags:
      env: local

worker:
  ocr:
    fixed-delay-ms: 1000
    batch-size: 10
    lock-lease-seconds: 600
    concurrency: 5
    backlog-log-minutes: 1
  ai:
    fixed-delay-ms: 500
    batch-size: 5
    lock-lease-seconds: 600
    concurrency: 3
    backlog-log-minutes: 1
  ai-solution:
    fixed-delay-ms: 500
    batch-size: 3
